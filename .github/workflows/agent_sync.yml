name: '🤖 Agent Sync'

on:
  push:
    branches:
      - main

jobs:
  agent_sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Clone agent-rules repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        ref: ${{ github.head_ref }}
    - name: Clone the agent-rules repo
      env:
        GITHUB_TOKEN: ${{ secrets.AGENT_SYNC_KEY }}
      run: |
        git clone https://x-access-token:${GITHUB_TOKEN}@github.com/dep/agent-rules.git ../agent-rules
    - name: Run agent-sync
      run: ../agent-rules/bin/agent-sync
    - name: Commit and open PR for agent-sync changes
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.AGENT_SYNC_KEY }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="chore/agent-sync"
        git checkout -b "$BRANCH"
        git add -A
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: sync agent rules"
          git push --force origin "$BRANCH"
          if ! gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore: sync agent rules" \
              --body "Auto-generated by the Agent Sync workflow. Merge to apply synced agent rules."
          fi
        fi
